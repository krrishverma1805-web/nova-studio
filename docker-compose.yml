version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: nova_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: novastudio
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d novastudio"]
      interval: 5s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:6.0
    container_name: nova_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nova_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@postgres:5432/novastudio?schema=public"
      MONGODB_URI: "mongodb://mongo:27017/novastudio"
      NEXTAUTH_SECRET: "default-nextauth-secret-needs-to-be-thirty-two-characters-long"
      NEXTAUTH_URL: "http://localhost:3000"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD: "adminpassword"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
